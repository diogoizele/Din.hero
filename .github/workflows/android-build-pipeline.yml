name: Android - Build

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: "Build configuration"
        required: true
        type: choice
        options:
          - debugDevelopment
          - debugProduction
          - releaseDevelopment
          - releaseProduction
      artifact_type:
        description: "Artifact type"
        required: true
        type: choice
        options:
          - apk
          - aab

  workflow_call:
    inputs:
      build_configuration:
        required: true
        type: string
      artifact_type:
        required: true
        type: string
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_GOOGLE_SERVICES_JSON_DEVELOPMENT_BASE64:
        required: true
      ANDROID_GOOGLE_SERVICES_JSON_PRODUCTION_BASE64:
        required: true

env:
  BUILD_CONFIGURATION: ${{ inputs.build_configuration || github.event.inputs.build_configuration }}
  ARTIFACT_TYPE: ${{ inputs.artifact_type || github.event.inputs.artifact_type }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_newArchEnabled: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}

      - name: Install dependencies
        run: bun install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}-${{ env.ORG_GRADLE_PROJECT_newArchEnabled }}

      - name: Prepare Android keystore (release only)
        if: ${{ env.BUILD_CONFIGURATION == 'releaseDevelopment' || env.BUILD_CONFIGURATION == 'releaseProduction' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Prepare Firebase Android json
        run: |
          if [[ "$BUILD_CONFIGURATION" == *Development* ]]; then
            FLAVOR=development
            JSON_BASE64="$ANDROID_GOOGLE_SERVICES_JSON_DEVELOPMENT_BASE64"
          else
            FLAVOR=production
            JSON_BASE64="$ANDROID_GOOGLE_SERVICES_JSON_PRODUCTION_BASE64"
          fi

          mkdir -p android/app/src/$FLAVOR
          echo "$JSON_BASE64" | base64 --decode > android/app/src/$FLAVOR/google-services.json
        env:
          ANDROID_GOOGLE_SERVICES_JSON_DEVELOPMENT_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_DEVELOPMENT_BASE64 }}
          ANDROID_GOOGLE_SERVICES_JSON_PRODUCTION_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_PRODUCTION_BASE64 }}

      - name: Clean Build
        run: cd android && ./gradlew clean

      - name: Build Android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          case "$BUILD_CONFIGURATION-$ARTIFACT_TYPE" in
            releaseDevelopment-apk)
              bun run build:android:developmentRelease
              echo "ARTIFACT_DIR=android/app/build/outputs/apk/development/release" >> $GITHUB_ENV
              ;;
            releaseProduction-apk)
              bun run build:android:productionRelease
              echo "ARTIFACT_DIR=android/app/build/outputs/apk/production/release" >> $GITHUB_ENV
              ;;
            *)
              echo "Unsupported configuration"
              exit 1
              ;;
          esac

      - id: get_version
        run: |
          VERSION_NAME=$(grep versionName android/app/build.gradle | head -1 | sed 's/.*versionName[[:space:]]*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep versionCode android/app/build.gradle | head -1 | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.ARTIFACT_TYPE }}-${{ steps.get_version.outputs.version_name }}-${{ steps.get_version.outputs.version_code }}
          path: ${{ env.ARTIFACT_DIR }}/**